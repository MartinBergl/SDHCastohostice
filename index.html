<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Startovní listina — Dětské závody Častohostice</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red:      #d63b2a;
      --red-soft: #fdf1f0;
      --bg:       #f7f6f4;
      --surface:  #ffffff;
      --border:   #e8e5e1;
      --text:     #1a1916;
      --sub:      #8a8580;
      --muted:    #c4c0bb;
      --gold:     #c8950a;
      --silver:   #7a8490;
      --bronze:   #a06830;
      --edit-bg:  #fffef5;
      --edit-border: #f0c040;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

    /* HEADER */
    .header { background:var(--surface); border-bottom:1px solid var(--border); padding:32px 48px; text-align:center; position:relative; }
    .header-logo { position:absolute; left:32px; top:50%; transform:translateY(-50%); height:130px; width:auto; }
    .header-logo-right { position:absolute; right:32px; top:50%; transform:translateY(-50%); height:110px; width:auto; }
    .header h1 { font-size:clamp(26px,4vw,42px); font-weight:600; letter-spacing:-0.5px; line-height:1.1; }
    .header h1 span { color:var(--red); }
    .header h1 small { display:block; font-size:0.45em; font-weight:400; color:var(--sub); letter-spacing:1px; margin-top:4px; }

    /* CONTENT */
    .content { padding:0 48px; }

    .category-block { margin-bottom:40px; opacity:0; transform:translateY(16px); animation:fadeUp 0.4s ease forwards; }
    .category-block:nth-child(1){animation-delay:.04s}
    .category-block:nth-child(2){animation-delay:.12s}
    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

    .cat-label { display:flex; align-items:center; gap:10px; padding:14px 0 10px; border-bottom:1px solid var(--border); }
    .cat-name { font-size:13px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--sub); }
    .cat-pill { font-size:11px; font-weight:500; color:var(--sub); background:var(--bg); border:1px solid var(--border); padding:2px 8px; border-radius:99px; }

    /* TABLES */
    table { width:100%; border-collapse:collapse; }
    thead th { font-size:11px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; color:var(--muted); padding:10px 14px; text-align:left; background:var(--surface); border-bottom:1px solid var(--border); }
    thead th.r { text-align:right; }
    thead th.c { text-align:center; }

    tbody tr { border-bottom:1px solid var(--border); transition:background .12s; background:var(--surface); }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:var(--red-soft); }
    tbody tr.rank-1 { background:#fffbf0; }
    tbody tr.rank-2 { background:#f8f9fa; }
    tbody tr.rank-3 { background:#fdf7f2; }
    tbody tr.rank-1:hover { background:#fff6d6; }
    tbody tr.rank-2:hover { background:#f0f2f4; }
    tbody tr.rank-3:hover { background:#faeee4; }

    td { padding:13px 14px; font-size:14px; vertical-align:middle; }

    .rank { font-family:'DM Sans',sans-serif; font-size:15px; font-weight:700; color:var(--sub); text-align:center; }
    .rank.g { color:var(--gold); font-size:20px; }
    .rank.s { color:var(--silver); font-size:18px; }
    .rank.b { color:var(--bronze); font-size:18px; }

    .snum { font-family:'DM Mono',monospace; font-size:13px; font-weight:500; display:inline-flex; align-items:center; justify-content:center; width:32px; height:26px; background:var(--bg); border:1px solid var(--border); border-radius:4px; color:var(--sub); }

    .tname { font-size:14px; font-weight:500; color:var(--text); }
    .torg  { font-size:12px; color:var(--sub); margin-top:1px; }

    .tcell { font-family:'DM Mono',monospace; font-size:14px; text-align:right; color:var(--sub); white-space:nowrap; }
    .tcell.best  { color:var(--text); font-weight:500; }
    .tcell.empty { color:var(--muted); font-size:12px; }

    .dsq-tag { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--red); background:var(--red-soft); border:1px solid #f5c6c2; padding:2px 6px; border-radius:4px; }
    .np-tag  { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:#b45309; background:#fffbeb; border:1px solid #fcd34d; padding:2px 6px; border-radius:4px; }

    .best-col { font-family:'DM Mono',monospace; font-size:15px; font-weight:500; text-align:right; color:var(--red); white-space:nowrap; }
    .best-col.empty { color:var(--muted); font-size:12px; font-weight:400; font-family:'DM Sans',sans-serif; }

    /* ── STARTOVNÍ LISTINA ── */
    .startlist-section { margin:0 48px 60px; padding-top:32px; border-top:1px solid var(--border); }

    .startlist-header { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
    .startlist-title { font-size:13px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--sub); }

    /* Admin bar */
    .admin-bar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .admin-input { font-family:'DM Sans',sans-serif; font-size:13px; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:6px 12px; border-radius:6px; outline:none; width:160px; transition:border-color .18s; }
    .admin-input:focus { border-color:var(--red); }
    .admin-input::placeholder { color:var(--muted); }
    .admin-btn { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; padding:6px 14px; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:var(--sub); cursor:pointer; transition:all .15s; white-space:nowrap; }
    .admin-btn:hover { background:var(--bg); color:var(--text); }
    .admin-btn.logout { border-color:#fca5a5; color:var(--red); background:var(--red-soft); }
    .admin-btn.logout:hover { background:#fde8e8; }
    .admin-btn.add { border-color:#86efac; color:#16a34a; background:#f0fdf4; }
    .admin-btn.add:hover { background:#dcfce7; }
    .admin-btn.export { border-color:#93c5fd; color:#1d6fba; background:#eff6ff; }
    .admin-btn.export:hover { background:#dbeafe; }
    .admin-on { font-size:12px; font-weight:600; color:#16a34a; }
    .admin-hint { font-size:12px; color:var(--red); }

    /* Startlist rows */
    .startlist-table tbody tr { background:var(--surface); }
    .startlist-table tbody tr:hover { background:var(--bg); }
    .startlist-table tbody tr.done { background:#e6f4e6; opacity:.8; border-left:4px solid #4ade80; }
    .startlist-table tbody tr.done .tname { text-decoration:line-through; color:#6b7280; }
    .startlist-table tbody tr.done .torg { color:var(--muted); }
    .startlist-table tbody tr.done .snum { color:#16a34a; border-color:#86efac; background:#f0fdf4; }
    .startlist-table tbody tr.done:hover { background:#d4edda; opacity:.9; }
    .startlist-table tbody tr.next { background:#fff8ec; border-left:3px solid var(--gold); }
    .startlist-table tbody tr.next:hover { background:#fff3d6; }

    .done-tag { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:#16a34a; background:#f0fdf4; border:1px solid #86efac; padding:2px 7px; border-radius:4px; }
    .next-tag { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:#b45309; background:#fffbeb; border:1px solid #fcd34d; padding:2px 7px; border-radius:4px; }

    .toggle-btn { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; color:var(--muted); background:none; border:1px solid var(--border); border-radius:4px; padding:3px 10px; cursor:pointer; transition:all .15s; white-space:nowrap; }
    .toggle-btn:hover { color:var(--text); border-color:var(--sub); }
    .done .toggle-btn { color:#16a34a; border-color:#86efac; background:#f0fdf4; }
    .done .toggle-btn:hover { background:#dcfce7; }

    .del-btn { font-size:16px; background:none; border:none; cursor:pointer; color:var(--muted); padding:2px 6px; border-radius:4px; line-height:1; transition:all .15s; }
    .del-btn:hover { color:var(--red); background:var(--red-soft); }

    .order-btn { font-size:14px; font-weight:600; background:none; border:1px solid var(--border); border-radius:4px; color:var(--sub); cursor:pointer; padding:1px 7px; line-height:1.4; transition:all .15s; }
    .order-btn:hover:not(:disabled) { background:var(--edit-bg); border-color:var(--edit-border); color:var(--text); }
    .order-btn:disabled { opacity:.25; cursor:default; }

    .cbadge { font-size:11px; font-weight:500; padding:2px 8px; border-radius:4px; white-space:nowrap; cursor:default; }
    .cb-ml { background:#eff6ff; color:#3b82f6; }
    .cb-st { background:#f0fdf4; color:#16a34a; }

    /* ── INLINE EDITING ── */
    .editable { cursor:text; border-radius:3px; transition:background .12s; }
    .editable:hover { background:rgba(240,192,64,.15); }

    /* Editing mode — highlight editable cells */
    body.edit-mode .editable { background:var(--edit-bg); outline:1px dashed var(--edit-border); }
    body.edit-mode .editable:focus { outline:2px solid var(--edit-border); background:#fffdf0; box-shadow:0 0 0 3px rgba(240,192,64,.2); }

    /* Categoria select */
    .cat-select { font-family:'DM Sans',sans-serif; font-size:11px; font-weight:500; padding:2px 6px; border-radius:4px; border:1px solid var(--edit-border); background:var(--edit-bg); color:var(--text); cursor:pointer; }

    /* Time input in table */
    .time-input { font-family:'DM Mono',monospace; font-size:13px; text-align:right; background:var(--edit-bg); border:1px solid var(--edit-border); border-radius:3px; padding:2px 6px; width:80px; color:var(--text); outline:none; }
    .time-input:focus { border-color:var(--gold); box-shadow:0 0 0 2px rgba(240,192,64,.2); }

    /* Edit mode banner */
    .edit-banner { display:none; background:var(--edit-bg); border-bottom:2px solid var(--edit-border); padding:8px 48px; font-size:12px; color:#92620a; font-weight:500; align-items:center; gap:8px; }
    body.edit-mode .edit-banner { display:flex; }

    /* FOOTER */
    footer { background:var(--surface); border-top:1px solid var(--border); padding:18px 48px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    footer span { font-size:12px; color:var(--muted); }
    footer strong { color:var(--sub); font-weight:500; }

    .admin-footer { padding:16px 48px 24px; display:flex; justify-content:flex-end; background:var(--bg); }

    @media (max-width:800px) {
      .header, .content, .startlist-section, footer, .edit-banner { padding-left:20px; padding-right:20px; }
      .startlist-section { margin-left:0; margin-right:0; }
    }
  </style>
</head>

  { start:9,  team:"SDH Starý Kolín B", org:"SDH Starý Kolín", kategorie:"Starší děti", cas1:20.33, cas2:"DSQ" },
  { start:10, team:"SDH Nymburk B",     org:"SDH Nymburk",     kategorie:"Starší děti", cas1:17.55, cas2:17.91 },
  { start:11, team:"SDH Kolín B",       org:"SDH Kolín",       kategorie:"Starší děti", cas1:21.08, cas2:20.44 },
  { start:12, team:"SDH Poděbrady B",   org:"SDH Poděbrady",   kategorie:"Starší děti", cas1:null,  cas2:22.15 },
];

const CATEGORIES = ["Mladší děti","Starší děti"];
const BADGE = { "Mladší děti":"cb-ml", "Starší děti":"cb-st" };

// ── STAV ─────────────────────────────────────────────
let isAdmin = false;
let data = loadData();
let doneSet = loadDone();

function loadData() {
  try {
    const r = localStorage.getItem(STORAGE_DATA);
    return r ? JSON.parse(r) : JSON.parse(JSON.stringify(DEFAULT_DATA));
  } catch { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}

function saveData() {
  try { localStorage.setItem(STORAGE_DATA, JSON.stringify(data)); } catch {}
}

function loadDone() {
  try {
    const r = localStorage.getItem(STORAGE_DONE);
    return r ? new Set(JSON.parse(r)) : new Set();
  } catch { return new Set(); }
}

function saveDone() {
  try { localStorage.setItem(STORAGE_DONE, JSON.stringify([...doneSet])); } catch {}
}

// ── HELPER: parse time value ──────────────────────────
function parseTimeVal(str) {
  const s = str.trim().toUpperCase();
  if (s === '' || s === '-' || s === '—') return null;
  if (s === 'DSQ') return 'DSQ';
  if (s === 'NP')  return 'NP';
  const n = parseFloat(s.replace(',', '.'));
  return isNaN(n) ? null : n;
}

// ── VÝSLEDKOVÁ TABULKA ────────────────────────────────
function bestTime(d) {
  const nums = [d.cas1, d.cas2].filter(t => typeof t === 'number');
  if (nums.length === 2) return Math.max(...nums);
  if (nums.length === 1) return nums[0];
  return null;
}

function renderTimeCell(val, isBest) {
  if (val === null || val === undefined) return `<td class="tcell empty">—</td>`;
  if (val === "DSQ") return `<td class="tcell" style="text-align:right"><span class="dsq-tag">DSQ</span></td>`;
  if (val === "NP")  return `<td class="tcell" style="text-align:right"><span class="np-tag">NP</span></td>`;
  return `<td class="tcell${isBest?' best':''}">${val.toFixed(2)}&thinsp;s</td>`;
}

function renderResults() {
  const el = document.getElementById('content');
  el.innerHTML = '';

  CATEGORIES.forEach(cat => {
    let rows = data.filter(d => d.kategorie === cat);
    if (!rows.length) return;

    rows = [...rows].sort((a, b) => {
      const ta = bestTime(a), tb = bestTime(b);
      if (ta===null && tb===null) return 0;
      if (ta===null) return 1;
      if (tb===null) return -1;
      return ta - tb;
    });

    const rowsHtml = rows.map((d, i) => {
      const bt = bestTime(d);
      const rc = bt!==null ? (i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'') : '';
      const rankTxt = i===0&&bt!==null?'🥇':i===1&&bt!==null?'🥈':i===2&&bt!==null?'🥉':(i+1)+'.';
      const rankCls = i===0&&bt!==null?'g':i===1&&bt!==null?'s':i===2&&bt!==null?'b':'';
      const c1n = typeof d.cas1==='number', c2n = typeof d.cas2==='number';
      const c1worst = c1n&&c2n ? d.cas1>=d.cas2 : c1n;
      const c2worst = c1n&&c2n ? d.cas2>d.cas1  : c2n;
      const bestHtml = bt!==null
        ? `<td class="best-col">${bt.toFixed(2)}&thinsp;s</td>`
        : `<td class="best-col empty">—</td>`;

      return `<tr class="${rc}">
        <td style="width:40px"><span class="rank ${rankCls}">${rankTxt}</span></td>
        <td style="width:50px;text-align:center"><span class="snum">${d.start}</span></td>
        <td><div class="tname">${d.team}</div></td>
        ${renderTimeCell(d.cas1, c1worst)}
        ${renderTimeCell(d.cas2, c2worst)}
        ${bestHtml}
      </tr>`;
    }).join('');

    const n = rows.length;
    const block = document.createElement('div');
    block.className = 'category-block';
    block.innerHTML = `
      <div class="cat-label">
        <span class="cat-name">${cat}</span>
        <span class="cat-pill">${n} ${n===1?'tým':n<5?'týmy':'týmů'}</span>
      </div>
      <table>
        <thead><tr>
          <th class="c">Poř.</th><th class="c">St. č.</th><th>Tým</th>
          <th class="r">Levý terč</th><th class="r">Pravý terč</th><th class="r">Výsledný čas</th>
        </tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>`;
    el.appendChild(block);
  });
}

// ── STARTOVNÍ LISTINA ────────────────────────────────
function timeDisplay(val) {
  if (val===null||val===undefined) return '—';
  if (val==='DSQ') return 'DSQ';
  if (val==='NP')  return 'NP';
  return val.toFixed(2)+' s';
}

function renderStartlist() {
  const tbody = document.getElementById('startlistBody');
  const sorted = [...data].sort((a,b) => a.start - b.start);

  // Update action column header
  document.getElementById('actionColHead').textContent = isAdmin ? 'Akce' : '';

  tbody.innerHTML = sorted.map((d, i) => {
    const isDone = doneSet.has(d.start);
    const isNext = !isDone && sorted.findIndex(x => !doneSet.has(x.start)) === i;
    const rowClass = isDone ? 'done' : isNext ? 'next' : '';

    const statusTag = isDone
      ? `<span class="done-tag">✓ Odběhnuto</span>`
      : isNext ? `<span class="next-tag">▶ Na řadě</span>` : '';

    // Editable cells (only in admin + edit mode)
    const editMode = isAdmin && document.body.classList.contains('edit-mode');

    const teamCell = editMode
      ? `<td><div class="tname editable" contenteditable="true" data-field="team" data-start="${d.start}" onblur="saveField(this)">${d.team}</div></td>`
      : `<td><div class="tname">${d.team}</div></td>`;

    const catCell = editMode
      ? `<td><select class="cat-select" data-field="kategorie" data-start="${d.start}" onchange="saveSelectField(this)">
          ${CATEGORIES.map(c=>`<option value="${c}"${c===d.kategorie?' selected':''}>${c}</option>`).join('')}
         </select></td>`
      : `<td><span class="cbadge ${BADGE[d.kategorie]}">${d.kategorie}</span></td>`;

    const cas1Cell = editMode
      ? `<td style="text-align:right"><input class="time-input" value="${timeDisplay(d.cas1).replace(' s','')}" data-field="cas1" data-start="${d.start}" onblur="saveTimeField(this)" /></td>`
      : `<td class="tcell">${timeDisplay(d.cas1)}</td>`;

    const cas2Cell = editMode
      ? `<td style="text-align:right"><input class="time-input" value="${timeDisplay(d.cas2).replace(' s','')}" data-field="cas2" data-start="${d.start}" onblur="saveTimeField(this)" /></td>`
      : `<td class="tcell">${timeDisplay(d.cas2)}</td>`;

    const actionCell = isAdmin ? `<td style="text-align:right;white-space:nowrap">
        ${editMode ? `
          <button class="order-btn" title="Posunout nahoru" onclick="moveTeam(${d.start}, -1)" ${i===0?'disabled':''}>↑</button>
          <button class="order-btn" title="Posunout dolů" onclick="moveTeam(${d.start}, 1)" ${i===sorted.length-1?'disabled':''}>↓</button>
        ` : ''}
        <button class="toggle-btn" onclick="toggleDone(${d.start})">${isDone?'Vrátit':'Odběhnuto'}</button>
        ${editMode ? `<button class="del-btn" title="Odstranit tým" onclick="deleteTeam(${d.start})">✕</button>` : ''}
      </td>` : '';

    return `<tr class="${rowClass}" data-start="${d.start}">
      <td style="width:50px;text-align:center"><span class="snum">${d.start}</span></td>
      ${teamCell}${catCell}${cas1Cell}${cas2Cell}
      <td style="width:120px;text-align:center">${statusTag}</td>
      ${actionCell}
    </tr>`;
  }).join('');
}

// ── EDIT FUNCTIONS ────────────────────────────────────
function saveField(el) {
  const startNum = parseInt(el.dataset.start);
  const field = el.dataset.field;
  const val = el.innerText.trim();
  const row = data.find(d => d.start === startNum);
  if (row) { row[field] = val; saveData(); renderResults(); }
}

function saveSelectField(el) {
  const startNum = parseInt(el.dataset.start);
  const field = el.dataset.field;
  const val = el.value;
  const row = data.find(d => d.start === startNum);
  if (row) { row[field] = val; saveData(); renderResults(); renderStartlist(); }
}

function saveTimeField(el) {
  const startNum = parseInt(el.dataset.start);
  const field = el.dataset.field;
  const val = parseTimeVal(el.value);
  const row = data.find(d => d.start === startNum);
  if (row) { row[field] = val; saveData(); renderResults(); }
}

function deleteTeam(startNum) {
  if (!confirm('Opravdu odstranit tento tým?')) return;
  data = data.filter(d => d.start !== startNum);
  doneSet.delete(startNum);
  saveData(); saveDone();
  renderResults(); renderStartlist();
}

function addTeam() {
  const maxStart = data.length ? Math.max(...data.map(d=>d.start)) : 0;
  data.push({ start: maxStart+1, team: 'Nový tým', org: 'Sbor', kategorie: 'Mladší děti', cas1: null, cas2: null });
  saveData();
  renderResults(); renderStartlist();
  setTimeout(() => document.getElementById('startlistBody').lastElementChild?.scrollIntoView({behavior:'smooth'}), 50);
}

function moveTeam(startNum, dir) {
  // Sort by current start number, swap with neighbour
  const sorted = [...data].sort((a,b) => a.start - b.start);
  const idx = sorted.findIndex(d => d.start === startNum);
  const swapIdx = idx + dir;
  if (swapIdx < 0 || swapIdx >= sorted.length) return;

  // Swap start numbers between the two rows
  const tmpStart = sorted[idx].start;
  sorted[idx].start = sorted[swapIdx].start;
  sorted[swapIdx].start = tmpStart;

  saveData(); renderResults(); renderStartlist();
}

// ── DONE TOGGLE ───────────────────────────────────────
function toggleDone(startNum) {
  if (!isAdmin) return;
  doneSet.has(startNum) ? doneSet.delete(startNum) : doneSet.add(startNum);
  saveDone(); renderStartlist();
}

// ── ADMIN BAR ─────────────────────────────────────────
function renderAdminBar() {
  const bar = document.getElementById('adminBar');
  if (isAdmin) {
    const editMode = document.body.classList.contains('edit-mode');
    bar.innerHTML = `
      <span class="admin-on">🔓 Admin</span>
      <button class="admin-btn ${editMode?'add':''}" onclick="toggleEditMode()">
        ${editMode ? '✏️ Editace ZAP' : '✏️ Editovat data'}
      </button>
      ${editMode ? `<button class="admin-btn add" onclick="addTeam()">＋ Přidat tým</button>` : ''}
      <button class="admin-btn export" onclick="exportCSV()" title="Stáhnout výsledky jako CSV pro Excel">⬇ Export CSV</button>
      <button class="admin-btn logout" onclick="logout()">Odhlásit</button>
    `;
  } else {
    bar.innerHTML = `
      <input type="password" id="adminPwd" class="admin-input" placeholder="Heslo admina…"
        onkeydown="if(event.key==='Enter') login()" />
      <button class="admin-btn" onclick="login()">Přihlásit</button>
      <span class="admin-hint" id="adminHint"></span>
    `;
  }
}

// ── EXPORT CSV ────────────────────────────────────────
function exportCSV() {
  // Výsledková tabulka — obě kategorie seřazené podle času
  const rows = [];
  rows.push(['DĚTSKÉ ZÁVODY ČASTOHOSTICE — VÝSLEDKY']);
  rows.push([]);

  CATEGORIES.forEach(cat => {
    let catRows = data.filter(d => d.kategorie === cat);
    if (!catRows.length) return;

    catRows = [...catRows].sort((a, b) => {
      const ta = bestTime(a), tb = bestTime(b);
      if (ta===null && tb===null) return 0;
      if (ta===null) return 1;
      if (tb===null) return -1;
      return ta - tb;
    });

    rows.push([`Kategorie: ${cat}`]);
    rows.push(['Pořadí', 'St. č.', 'Tým', 'Kategorie', 'Levý terč (s)', 'Pravý terč (s)', 'Čas do pořadí (s)']);

    catRows.forEach((d, i) => {
      const bt = bestTime(d);
      rows.push([
        i + 1,
        d.start,
        d.team,
        d.kategorie,
        formatCSVTime(d.cas1),
        formatCSVTime(d.cas2),
        bt !== null ? bt.toFixed(2) : '—'
      ]);
    });

    rows.push([]);
  });

  // Startovní listina
  rows.push(['STARTOVNÍ LISTINA']);
  rows.push(['St. č.', 'Tým', 'Kategorie', 'Levý terč (s)', 'Pravý terč (s)', 'Stav']);
  const sorted = [...data].sort((a,b) => a.start - b.start);
  sorted.forEach(d => {
    rows.push([
      d.start,
      d.team,
      d.kategorie,
      formatCSVTime(d.cas1),
      formatCSVTime(d.cas2),
      doneSet.has(d.start) ? 'Odběhnuto' : ''
    ]);
  });

  // Sestavit CSV string s BOM pro správné kódování v Excelu
  const BOM = '\uFEFF';
  const csv = BOM + rows.map(r =>
    r.map(cell => {
      const s = String(cell ?? '');
      return s.includes(',') || s.includes('"') || s.includes('\n')
        ? `"${s.replace(/"/g, '""')}"` : s;
    }).join(',')
  ).join('\r\n');

  // Stáhnout soubor
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `vysledky-castohostice.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function formatCSVTime(val) {
  if (val === null || val === undefined) return '—';
  if (val === 'DSQ') return 'DSQ';
  if (val === 'NP')  return 'NP';
  return val.toFixed(2);
}

function toggleEditMode() {
  document.body.classList.toggle('edit-mode');
  renderAdminBar();
  renderStartlist();
}

function login() {
  const val = document.getElementById('adminPwd')?.value;
  if (val === ADMIN_PASSWORD) {
    isAdmin = true;
    renderAdminBar();
    renderStartlist();
  } else {
    const h = document.getElementById('adminHint');
    if (h) h.textContent = '✗ Špatné heslo';
    document.getElementById('adminPwd').value = '';
    setTimeout(() => { const h2=document.getElementById('adminHint'); if(h2) h2.textContent=''; }, 2000);
  }
}

function logout() {
  isAdmin = false;
  document.body.classList.remove('edit-mode');
  renderAdminBar();
  renderStartlist();
}

// ── INIT ─────────────────────────────────────────────
renderResults();
renderAdminBar();
renderStartlist();
</script>
</body>
</html>
