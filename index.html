<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Startovní listina — Dětské závody Častohostice</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <style>
    :root {
      --red:      #d63b2a;
      --red-soft: #fdf1f0;
      --bg:       #f7f6f4;
      --surface:  #ffffff;
      --border:   #e8e5e1;
      --text:     #1a1916;
      --sub:      #8a8580;
      --muted:    #c4c0bb;
      --gold:     #c8950a;
      --silver:   #7a8490;
      --bronze:   #a06830;
      --edit-bg:  #fffef5;
      --edit-border: #f0c040;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

    /* HEADER */
    .header { background:var(--surface); border-bottom:1px solid var(--border); padding:32px 48px; text-align:center; position:relative; }
    .header-logo { position:absolute; left:32px; top:50%; transform:translateY(-50%); height:130px; width:auto; }
    .header-logo-right { position:absolute; right:32px; top:50%; transform:translateY(-50%); height:110px; width:auto; }
    .header h1 { font-size:clamp(26px,4vw,42px); font-weight:600; letter-spacing:-0.5px; line-height:1.1; }
    .header h1 span { color:var(--red); }
    .header h1 small { display:block; font-size:0.45em; font-weight:400; color:var(--sub); letter-spacing:1px; margin-top:4px; }

    /* CONTENT */
    .content { padding:0 48px; }

    .category-block { margin-bottom:40px; opacity:0; transform:translateY(16px); animation:fadeUp 0.4s ease forwards; }
    .category-block:nth-child(1){animation-delay:.04s}
    .category-block:nth-child(2){animation-delay:.12s}
    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

    .cat-label { display:flex; align-items:center; gap:12px; padding:18px 0 14px; border-bottom:2px solid var(--border); margin-bottom:2px; }
    .cat-name { font-size:22px; font-weight:700; letter-spacing:-0.3px; text-transform:none; color:var(--text); }
    .cat-pill { font-size:11px; font-weight:600; color:#1d6fba; background:#fff; border:1px solid #93c5fd; padding:3px 10px; border-radius:99px; }

    /* TABLES */
    table { width:100%; border-collapse:collapse; }
    thead th { font-size:11px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; color:var(--text); padding:10px 14px; text-align:left; background:var(--surface); border-bottom:1px solid var(--border); }
    thead th.r { text-align:right; }
    thead th.c { text-align:center; }

    .startlist-table thead th {
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 1px 0 var(--border);
    }

    tbody tr { border-bottom:1px solid var(--border); transition:background .12s; background:var(--surface); }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:var(--red-soft); }
    tbody tr.rank-1 { background:#fffbf0; }
    tbody tr.rank-2 { background:#f8f9fa; }
    tbody tr.rank-3 { background:#fdf7f2; }
    tbody tr.rank-1:hover { background:#fff6d6; }
    tbody tr.rank-2:hover { background:#f0f2f4; }
    tbody tr.rank-3:hover { background:#faeee4; }

    td { padding:13px 14px; font-size:14px; vertical-align:middle; }

    .rank { font-family:'DM Sans',sans-serif; font-size:15px; font-weight:700; color:var(--sub); text-align:center; }
    .rank.g { color:var(--gold); font-size:20px; }
    .rank.s { color:var(--silver); font-size:18px; }
    .rank.b { color:var(--bronze); font-size:18px; }

    .snum { font-family:'DM Mono',monospace; font-size:13px; font-weight:500; display:inline-flex; align-items:center; justify-content:center; width:32px; height:26px; background:var(--bg); border:1px solid var(--border); border-radius:4px; color:var(--sub); }

    .tname { font-size:14px; font-weight:500; color:var(--text); }

    .tcell { font-family:'DM Mono',monospace; font-size:14px; text-align:right; color:var(--sub); white-space:nowrap; }
    .tcell.best  { color:var(--text); font-weight:500; }
    .tcell.empty { color:var(--muted); font-size:12px; }

    .dsq-tag { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--red); background:var(--red-soft); border:1px solid #f5c6c2; padding:2px 6px; border-radius:4px; }
    .np-tag  { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:#b45309; background:#fffbeb; border:1px solid #fcd34d; padding:2px 6px; border-radius:4px; }

    .best-col { font-family:'DM Mono',monospace; font-size:15px; font-weight:500; text-align:right; color:var(--red); white-space:nowrap; }
    .best-col.empty { color:var(--muted); font-size:12px; font-weight:400; font-family:'DM Sans',sans-serif; }

    /* ── STARTOVNÍ LISTINA ── */
    .startlist-section { margin:0 48px 60px; padding-top:32px; border-top:1px solid var(--border); }

    .startlist-header { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; flex-wrap:wrap; padding:18px 0 14px; border-bottom:2px solid var(--border); }
    .startlist-title { font-size:22px; font-weight:700; letter-spacing:-0.3px; text-transform:none; color:var(--text); }

    /* Admin bar */
    .admin-bar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .admin-input { font-family:'DM Sans',sans-serif; font-size:13px; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:6px 12px; border-radius:6px; outline:none; width:160px; transition:border-color .18s; }
    .admin-input:focus { border-color:var(--red); }
    .admin-input::placeholder { color:var(--muted); }
    .admin-btn { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; padding:6px 14px; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:var(--sub); cursor:pointer; transition:all .15s; white-space:nowrap; }
    .admin-btn:hover { background:var(--bg); color:var(--text); }
    .admin-btn.logout { border-color:#fca5a5; color:var(--red); background:var(--red-soft); }
    .admin-btn.logout:hover { background:#fde8e8; }
    .admin-btn.add { border-color:#86efac; color:#16a34a; background:#f0fdf4; }
    .admin-btn.add:hover { background:#dcfce7; }
    .admin-btn.export { border-color:#93c5fd; color:#1d6fba; background:#eff6ff; }
    .admin-btn.export:hover { background:#dbeafe; }
    .admin-on { font-size:12px; font-weight:600; color:#16a34a; }
    .admin-hint { font-size:12px; color:var(--red); }

    /* Startlist rows */
    .startlist-table tbody tr { background:var(--surface); }
    .startlist-table tbody tr:hover { background:var(--bg); }
    .startlist-table tbody tr.done { background:#e6f4e6; opacity:.8; border-left:4px solid #4ade80; }
    .startlist-table tbody tr.done .tname { text-decoration:line-through; color:#6b7280; }
    .startlist-table tbody tr.done .snum { color:#16a34a; border-color:#86efac; background:#f0fdf4; }
    .startlist-table tbody tr.done:hover { background:#d4edda; opacity:.9; }
    .startlist-table tbody tr.next { background:#fff8ec; border-left:3px solid var(--gold); }
    .startlist-table tbody tr.next:hover { background:#fff3d6; }

    .done-tag { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:#16a34a; background:#f0fdf4; border:1px solid #86efac; padding:2px 7px; border-radius:4px; }
    .next-tag { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:#b45309; background:#fffbeb; border:1px solid #fcd34d; padding:2px 7px; border-radius:4px; }

    .toggle-btn { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; color:var(--muted); background:none; border:1px solid var(--border); border-radius:4px; padding:3px 10px; cursor:pointer; transition:all .15s; white-space:nowrap; }
    .toggle-btn:hover { color:var(--text); border-color:var(--sub); }
    .done .toggle-btn { color:#16a34a; border-color:#86efac; background:#f0fdf4; }
    .done .toggle-btn:hover { background:#dcfce7; }

    .del-btn { font-size:16px; background:none; border:none; cursor:pointer; color:var(--muted); padding:2px 6px; border-radius:4px; line-height:1; transition:all .15s; }
    .del-btn:hover { color:var(--red); background:var(--red-soft); }

    .order-btn { font-size:14px; font-weight:600; background:none; border:1px solid var(--border); border-radius:4px; color:var(--sub); cursor:pointer; padding:1px 7px; line-height:1.4; transition:all .15s; }
    .order-btn:hover:not(:disabled) { background:var(--edit-bg); border-color:var(--edit-border); color:var(--text); }
    .order-btn:disabled { opacity:.25; cursor:default; }

    .cbadge { font-size:11px; font-weight:500; padding:2px 8px; border-radius:4px; white-space:nowrap; cursor:default; }
    .cb-ml { background:#eff6ff; color:#3b82f6; }
    .cb-st { background:#f0fdf4; color:#16a34a; }

    /* ── INLINE EDITING ── */
    .editable { cursor:text; border-radius:3px; transition:background .12s; }
    .editable:hover { background:rgba(240,192,64,.15); }

    body.edit-mode .editable { background:var(--edit-bg); outline:1px dashed var(--edit-border); }
    body.edit-mode .editable:focus { outline:2px solid var(--edit-border); background:#fffdf0; box-shadow:0 0 0 3px rgba(240,192,64,.2); }

    .cat-select { font-family:'DM Sans',sans-serif; font-size:11px; font-weight:500; padding:2px 6px; border-radius:4px; border:1px solid var(--edit-border); background:var(--edit-bg); color:var(--text); cursor:pointer; }

    .time-input { font-family:'DM Mono',monospace; font-size:13px; text-align:right; background:var(--edit-bg); border:1px solid var(--edit-border); border-radius:3px; padding:2px 6px; width:80px; color:var(--text); outline:none; }
    .time-input:focus { border-color:var(--gold); box-shadow:0 0 0 2px rgba(240,192,64,.2); }

    /* Edit mode banner */
    .edit-banner { display:none; background:var(--edit-bg); border-bottom:2px solid var(--edit-border); padding:8px 48px; font-size:12px; color:#92620a; font-weight:500; align-items:center; gap:8px; }
    body.edit-mode .edit-banner { display:flex; }

    /* FOOTER */
    footer { background:var(--surface); border-top:1px solid var(--border); padding:18px 48px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    footer span { font-size:12px; color:var(--muted); }
    footer strong { color:var(--sub); font-weight:500; }

    .admin-footer { padding:16px 48px 24px; display:flex; justify-content:center; background:var(--bg); }

    /* ── RESULT CARDS (mobile) ── */
    .result-cards { display:none; }

    .result-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-bottom:8px; padding:12px 14px; display:flex; align-items:center; gap:12px; transition:background .12s; }
    .result-card.rank-1 { background:#fffbf0; border-color:#f0d060; }
    .result-card.rank-2 { background:#f8f9fa; }
    .result-card.rank-3 { background:#fdf7f2; border-color:#e8c8a8; }

    .rc-rank { font-size:22px; min-width:36px; text-align:center; flex-shrink:0; }
    .rc-rank.num { font-size:15px; font-weight:700; color:var(--sub); }
    .rc-body { flex:1; min-width:0; }
    .rc-team { font-size:14px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .rc-snum { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); margin-top:2px; }
    .rc-times { display:flex; flex-direction:column; align-items:flex-end; gap:3px; flex-shrink:0; }
    .rc-best { font-family:'DM Mono',monospace; font-size:16px; font-weight:700; color:var(--red); }
    .rc-best.empty { color:var(--muted); font-size:13px; font-weight:400; font-family:'DM Sans',sans-serif; }
    .rc-sub-times { font-family:'DM Mono',monospace; font-size:11px; color:var(--sub); }
    .rc-sub-times .worst { color:var(--muted); }

    /* ── STARTLIST CARDS (mobile) ── */
    .startlist-cards { display:none; }

    .sl-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-bottom:8px; padding:12px 14px; transition:background .12s; }
    .sl-card.done { background:#e6f4e6; border-left:4px solid #4ade80; opacity:.85; }
    .sl-card.done .sl-team { text-decoration:line-through; color:#6b7280; }
    .sl-card.next { background:#fff8ec; border-left:4px solid var(--gold); }

    .sl-card-top { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
    .sl-snum-big { font-family:'DM Mono',monospace; font-size:13px; font-weight:500; display:inline-flex; align-items:center; justify-content:center; min-width:32px; height:26px; background:var(--bg); border:1px solid var(--border); border-radius:4px; color:var(--sub); flex-shrink:0; }
    .done .sl-snum-big { color:#16a34a; border-color:#86efac; background:#f0fdf4; }
    .sl-team { font-size:15px; font-weight:600; color:var(--text); flex:1; min-width:0; }
    .sl-status { flex-shrink:0; }
    .sl-card-bottom { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .sl-cat { flex:1; }
    .sl-times { display:flex; gap:12px; align-items:center; }
    .sl-time-item { display:flex; flex-direction:column; align-items:flex-end; }
    .sl-time-label { font-size:9px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; color:var(--muted); }
    .sl-time-val { font-family:'DM Mono',monospace; font-size:13px; color:var(--sub); }
    .sl-time-val.empty { color:var(--muted); font-size:11px; }
    .sl-card-actions { margin-top:10px; padding-top:10px; border-top:1px solid var(--border); display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .sl-zapis { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); margin-left:auto; }
    .sl-card .editable { display:block; }
    .sl-card .cat-select { font-size:11px; }
    .sl-card .time-input { width:72px; font-size:12px; }

    /* ── RYCHLÉ ZADÁNÍ ČASU ── */
    .quick-time-popup { position:fixed; z-index:1000; background:var(--surface); border:1px solid var(--border); border-radius:10px; box-shadow:0 8px 32px rgba(0,0,0,.14); padding:14px 16px; min-width:220px; animation:popIn .15s ease; }
    @keyframes popIn { from { opacity:0; transform:scale(.95) translate(-50%,-50%); } to { opacity:1; transform:scale(1) translate(-50%,-50%); } }
    .qtp-title { font-size:12px; font-weight:600; color:var(--sub); letter-spacing:.5px; margin-bottom:10px; }
    .qtp-team  { font-size:14px; font-weight:600; color:var(--text); margin-bottom:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .qtp-row   { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
    .qtp-label { font-size:11px; font-weight:600; color:var(--sub); width:80px; flex-shrink:0; }
    .qtp-input { font-family:'DM Mono',monospace; font-size:14px; background:var(--edit-bg); border:1px solid var(--edit-border); border-radius:5px; padding:5px 8px; width:100px; outline:none; color:var(--text); }
    .qtp-input:focus { border-color:var(--gold); box-shadow:0 0 0 2px rgba(240,192,64,.2); }
    .qtp-btns  { display:flex; gap:6px; margin-top:12px; }
    .qtp-save  { flex:1; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; background:var(--red); color:#fff; border:none; border-radius:6px; padding:7px; cursor:pointer; transition:background .15s; }
    .qtp-save:hover { background:#b83020; }
    .qtp-cancel { font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; background:var(--bg); color:var(--sub); border:1px solid var(--border); border-radius:6px; padding:7px 12px; cursor:pointer; }
    .qtp-cancel:hover { background:var(--border); }
    .qtp-overlay { position:fixed; inset:0; z-index:999; }

    body.admin-mode .tcell.clickable { cursor:pointer; border-radius:4px; transition:background .12s; }
    body.admin-mode .tcell.clickable:hover { background:rgba(240,192,64,.18); }

    /* ── HISTORIE ZMĚN ── */
    .history-panel { margin:0 48px 32px; border:1px solid var(--border); border-radius:10px; background:var(--surface); overflow:hidden; }
    .history-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border); background:var(--bg); cursor:pointer; user-select:none; }
    .history-header:hover { background:var(--border); }
    .history-title { font-size:13px; font-weight:600; color:var(--sub); }
    .history-toggle { font-size:12px; color:var(--muted); }
    .history-body { display:none; max-height:260px; overflow-y:auto; }
    .history-body.open { display:block; }
    .history-empty { font-size:13px; color:var(--muted); padding:16px; text-align:center; }
    .history-item { display:flex; align-items:center; gap:10px; padding:9px 16px; border-bottom:1px solid var(--border); font-size:13px; }
    .history-item:last-child { border-bottom:none; }
    .hi-time { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); white-space:nowrap; flex-shrink:0; }
    .hi-text { flex:1; color:var(--text); }
    .hi-text strong { font-weight:600; }
    .hi-undo { font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600; color:var(--red); background:var(--red-soft); border:1px solid #f5c6c2; border-radius:4px; padding:2px 8px; cursor:pointer; white-space:nowrap; flex-shrink:0; }
    .hi-undo:hover { background:#fde8e8; }

    @media (max-width:700px) {
      .history-panel { margin-left:0; margin-right:0; border-radius:0; border-left:none; border-right:none; }
    }

    /* ── DRAG & DROP ── */
    .drag-handle { cursor:grab; color:var(--muted); font-size:16px; padding:0 6px; user-select:none; touch-action:none; line-height:1; }
    .drag-handle:active { cursor:grabbing; }
    tr.dragging, .sl-card.dragging { opacity:0.4; background:var(--edit-bg) !important; }
    tr.drag-over { border-top:3px solid var(--gold) !important; }
    .sl-card.drag-over { border-top:3px solid var(--gold) !important; }

    /* ── FÁZE SOUTĚŽE ── */
    .phase-banner { margin:32px 48px; padding:28px 32px; background:var(--surface); border:1px solid var(--border); border-radius:12px; text-align:center; }
    .phase-banner-icon { font-size:40px; margin-bottom:12px; }
    .phase-banner h2 { font-size:22px; font-weight:700; color:var(--text); margin-bottom:8px; }
    .phase-banner p  { font-size:14px; color:var(--sub); line-height:1.6; }

    /* Odpočet */
    .countdown-wrap { margin-top:20px; display:flex; justify-content:center; gap:12px; flex-wrap:wrap; }
    .countdown-unit { display:flex; flex-direction:column; align-items:center; gap:4px; min-width:64px; }
    .countdown-num  { font-family:'DM Mono',monospace; font-size:36px; font-weight:700; color:var(--red); background:var(--red-soft); border:1px solid #f5c6c2; border-radius:10px; padding:8px 14px; line-height:1; min-width:64px; text-align:center; }
    .countdown-label { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
    .countdown-done  { font-size:16px; font-weight:600; color:#16a34a; margin-top:12px; }

    .countdown-admin { margin-top:16px; display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap; }
    .countdown-admin label { font-size:12px; color:var(--sub); font-weight:500; }
    .countdown-admin input[type="datetime-local"] { font-family:'DM Sans',sans-serif; font-size:13px; background:var(--edit-bg); border:1px solid var(--edit-border); border-radius:6px; padding:5px 10px; color:var(--text); outline:none; }
    .countdown-admin input[type="datetime-local"]:focus { border-color:var(--gold); }
    .countdown-admin-btn { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; padding:5px 12px; border-radius:6px; border:1px solid var(--edit-border); background:var(--edit-bg); color:#92620a; cursor:pointer; transition:all .15s; }
    .countdown-admin-btn:hover { background:#fef3c7; }
    .countdown-admin-btn.clear { border-color:#fca5a5; color:var(--red); background:var(--red-soft); }
    .countdown-admin-btn.clear:hover { background:#fde8e8; }

    .cdt-accordion-toggle { display:inline-flex; align-items:center; gap:6px; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; color:#92620a; background:var(--edit-bg); border:1px solid var(--edit-border); border-radius:6px; padding:5px 12px; cursor:pointer; transition:all .15s; user-select:none; }
    .cdt-accordion-toggle:hover { background:#fef3c7; }
    .cdt-accordion-toggle .cdt-arrow { transition:transform .22s ease; display:inline-block; }
    .cdt-accordion-toggle.open .cdt-arrow { transform:rotate(180deg); }
    .cdt-accordion-body { overflow:hidden; max-height:0; transition:max-height .28s ease, opacity .22s ease, margin-top .22s ease; opacity:0; margin-top:0; }
    .cdt-accordion-body.open { max-height:120px; opacity:1; margin-top:12px; }

    .admin-btn.phase-hidden  { border-color:#fca5a5; color:var(--red);   background:var(--red-soft); }
    .admin-btn.phase-hidden:hover  { background:#fde8e8; }
    .admin-btn.phase-results { border-color:#86efac; color:#16a34a; background:#f0fdf4; }
    .admin-btn.phase-results:hover { background:#dcfce7; }

    @media (max-width:700px) {

    /* ── LOADING OVERLAY ── */
    #loadingOverlay { position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; align-items:center; justify-content:center; transition:opacity 0.25s ease; }

    /* ── SAVING INDICATOR ── */

    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
    #savingIndicator.error .saving-dot { background: var(--red); animation: none; }

    /* ── MOBILE ── */
    @media (max-width:700px) {
      .header, .content, .startlist-section, footer, .edit-banner, .admin-footer { padding-left:16px; padding-right:16px; }
      .startlist-section { margin-left:0; margin-right:0; padding-top:24px; }
      .header { padding:16px; }
      .header img { max-width:100% !important; }
      .cat-label { padding:14px 0 10px; }
      .cat-name { font-size:18px; }
      .results-table { display:none; }
      .result-cards { display:block; }
      .startlist-table { display:none; }
      .startlist-cards { display:block; }
      .startlist-title { font-size:18px; }
      .startlist-header { padding:14px 0 10px; margin-bottom:12px; }
      .admin-bar { justify-content:center; width:100%; }
      .admin-input { width:140px; }
      .edit-banner { padding:8px 16px; font-size:11px; }
      footer { flex-direction:column; align-items:flex-start; gap:4px; padding:16px; }
      .sponzori-img { max-width:100% !important; width:100% !important; }
      .startlist-table thead th { position:static; box-shadow:none; }
    }
  </style>
</head>

<script>
// ═══════════════════════════════════════════════════════
//  KONFIGURACE — vyplňte po nasazení Apps Scriptu
// ═══════════════════════════════════════════════════════
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz5rptM4YUoyBLbioOZWHgO_YFI7_WuzpnpVC72oKQxhWAFpP2btZVq3me9vTPwd0xKZQ/exec";
// Příklad: "https://script.google.com/macros/s/AKfycby.../exec"

// ── Polling interval pro návštěvníky (ms) ─────────────
const POLL_INTERVAL_VISITOR = 8000;   // každých 8 s
const POLL_INTERVAL_ADMIN   = 5000;   // každých 5 s

// ═══════════════════════════════════════════════════════
//  VÝCHOZÍ DATA (použijí se při prvním spuštění)
// ═══════════════════════════════════════════════════════
const DEFAULT_DATA = [
  { start:1,  team:"SDH Starý Kolín A", kategorie:"Mladší děti", cas1:null, cas2:null },
  { start:2,  team:"SDH Nymburk",       kategorie:"Mladší děti", cas1:null, cas2:null },
  { start:3,  team:"SDH Poděbrady",     kategorie:"Mladší děti", cas1:null, cas2:null },
  { start:4,  team:"SDH Kouřim A",      kategorie:"Mladší děti", cas1:null, cas2:null },
  { start:5,  team:"SDH Kolín centrum", kategorie:"Mladší děti", cas1:null, cas2:null },
  { start:6,  team:"SDH Velký Osek",    kategorie:"Mladší děti", cas1:null, cas2:null },
  { start:7,  team:"SDH Pečky",         kategorie:"Starší děti", cas1:null, cas2:null },
  { start:8,  team:"SDH Kouřim B",      kategorie:"Starší děti", cas1:null, cas2:null },
  { start:9,  team:"SDH Starý Kolín B", kategorie:"Starší děti", cas1:null, cas2:null },
  { start:10, team:"SDH Nymburk B",     kategorie:"Starší děti", cas1:null, cas2:null },
  { start:11, team:"SDH Kolín B",       kategorie:"Starší děti", cas1:null, cas2:null },
  { start:12, team:"SDH Poděbrady B",   kategorie:"Starší děti", cas1:null, cas2:null },
];

const CATEGORIES = ["Mladší děti","Starší děti"];
const BADGE = { "Mladší děti":"cb-ml", "Starší děti":"cb-st" };

// ═══════════════════════════════════════════════════════
//  STAV APLIKACE
// ═══════════════════════════════════════════════════════
let isAdmin        = false;
let adminPassword  = null;           // heslo uložené po přihlášení (v paměti, ne v localStorage)
let data           = JSON.parse(JSON.stringify(DEFAULT_DATA));
let doneSet        = new Set();
let phase          = 'hidden';
let countdownTarget = null;
const changeHistory = [];

let _pollTimer     = null;

// ═══════════════════════════════════════════════════════
//  SAVING INDICATOR
// ═══════════════════════════════════════════════════════
let _savingTimer = null;
function showSaving(text) {
  const el = document.getElementById('savingIndicator');
  const tx = document.getElementById('savingText');
  if (!el) return;
  el.classList.remove('error');
  el.classList.add('visible');
  if (tx) tx.textContent = text || 'Ukládám…';
  if (_savingTimer) clearTimeout(_savingTimer);
}
function showSaved() {
  const el = document.getElementById('savingIndicator');
  const tx = document.getElementById('savingText');
  if (!el) return;
  el.classList.remove('error');
  if (tx) tx.textContent = '✓ Uloženo';
  if (_savingTimer) clearTimeout(_savingTimer);
  _savingTimer = setTimeout(() => el.classList.remove('visible'), 1500);
}
function showSaveError(msg) {
  const el = document.getElementById('savingIndicator');
  const tx = document.getElementById('savingText');
  if (!el) return;
  el.classList.add('error');
  if (tx) tx.textContent = '✗ ' + (msg || 'Chyba uložení');
  if (_savingTimer) clearTimeout(_savingTimer);
  _savingTimer = setTimeout(() => el.classList.remove('visible'), 4000);
}

// ═══════════════════════════════════════════════════════
//  API VOLÁNÍ
// ═══════════════════════════════════════════════════════

// GET — načti data ze Sheetu
async function apiFetch(withHistory = false) {
  let url = APPS_SCRIPT_URL + `?action=load`;
  if (withHistory) url += `&pwd=${encodeURIComponent(adminPassword)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || 'API chyba');
  return json;
}

// "POST" přes GET+payload — obchází CORS preflight (nutné pro file:// origin)
async function apiPost(body) {
  const action  = body.action;
  // saveData posílá velké množství dat — použijeme POST (GET má limit URL délky)
  if (action === 'saveData') {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ ...body, pwd: adminPassword }),
      headers: { 'Content-Type': 'text/plain' }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'API chyba');
    return json;
  }
  // Ostatní akce jsou krátké — GET stačí
  const payload = JSON.stringify(body);
  const url = APPS_SCRIPT_URL
    + `?action=${encodeURIComponent(action)}`
    + `&pwd=${encodeURIComponent(adminPassword)}`
    + `&payload=${encodeURIComponent(payload)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || 'API chyba');
  return json;
}

// ── Debounced save helpers ─────────────────────────────
let _saveDataTimer = null;
function saveData(immediate = false) {
  if (_saveDataTimer) clearTimeout(_saveDataTimer);
  const doSave = async () => {
    showSaving();
    try {
      await apiPost({ action: 'saveData', data });
      showSaved();
    } catch(e) { showSaveError(e.message); }
  };
  if (immediate) { doSave(); }
  else { _saveDataTimer = setTimeout(doSave, 400); }
}

async function saveTeamPatch(startNum) {
  const row = data.find(d => d.start === startNum);
  if (!row) return;
  showSaving();
  try {
    await apiPost({ action: 'patchTeamTime', start: startNum, cas1: row.cas1 ?? null, cas2: row.cas2 ?? null, zapisCas: row.zapisCas ?? null });
    showSaved();
  } catch(e) { showSaveError(e.message); }
}

async function saveTeamFullPatch(startNum) {
  const row = data.find(d => d.start === startNum);
  if (!row) return;
  showSaving();
  try {
    await apiPost({ action: 'patchTeamFull', start: startNum, team: row.team, kategorie: row.kategorie, cas1: row.cas1 ?? null, cas2: row.cas2 ?? null, zapisCas: row.zapisCas ?? null });
    showSaved();
  } catch(e) { showSaveError(e.message); }
}

let _saveDoneTimer = null;
function saveDone() {
  if (_saveDoneTimer) clearTimeout(_saveDoneTimer);
  _saveDoneTimer = setTimeout(async () => {
    const obj = {};
    doneSet.forEach(id => { obj[String(id)] = true; });
    showSaving();
    try {
      await apiPost({ action: 'saveDone', done: Object.keys(obj).length ? obj : null });
      showSaved();
    } catch(e) { showSaveError(e.message); }
  }, 300);
}

async function savePhase() {
  showSaving();
  try {
    await apiPost({ action: 'savePhase', phase });
    showSaved();
  } catch(e) { showSaveError(e.message); }
}

async function saveCountdown() {
  showSaving();
  try {
    await apiPost({ action: 'saveCountdown', countdown: countdownTarget ?? null });
    showSaved();
  } catch(e) { showSaveError(e.message); }
}

let _saveHistoryTimer = null;
function saveHistory() {
  if (_saveHistoryTimer) clearTimeout(_saveHistoryTimer);
  _saveHistoryTimer = setTimeout(async () => {
    try {
      await apiPost({ action: 'saveHistory', history: changeHistory.slice(0, 10) });
    } catch(e) { console.warn('saveHistory:', e.message); }
  }, 800);
}

// ═══════════════════════════════════════════════════════
//  NAČTENÍ DAT
// ═══════════════════════════════════════════════════════
async function loadData(forAdmin = false) {
  try {
    const json = await apiFetch(forAdmin);
    if (json.data && json.data.length) {
      data = json.data;
    } else if (!json.data || !json.data.length) {
      // Sheet je prázdný — inicializuj výchozími daty
      data = JSON.parse(JSON.stringify(DEFAULT_DATA));
      if (forAdmin) saveData(true);
    }
    doneSet = new Set((json.done || []).map(Number));
    phase = json.phase || 'hidden';
    countdownTarget = json.countdown || null;
    if (forAdmin && json.history) {
      changeHistory.length = 0;
      changeHistory.push(...json.history);
    }
  } catch(e) {
    console.error('loadData:', e);
    // Při chybě načtení zobraz výchozí data
    if (!data.length) data = JSON.parse(JSON.stringify(DEFAULT_DATA));
  }
  renderAll();
  hideOverlay();
}

function renderAll() {
  renderPhaseBanner();
  renderStartlistSection();
  renderResults();
  renderStartlist();
  renderHistory();
}

// ── Polling ────────────────────────────────────────────
function startPolling() {
  if (_pollTimer) clearInterval(_pollTimer);
  const interval = isAdmin ? POLL_INTERVAL_ADMIN : POLL_INTERVAL_VISITOR;
  _pollTimer = setInterval(async () => {
    try {
      const json = await apiFetch(isAdmin);
      let changed = false;
      if (json.data && JSON.stringify(json.data) !== JSON.stringify(data)) {
        data = json.data; changed = true;
      }
      const newDone = new Set((json.done || []).map(Number));
      if (JSON.stringify([...newDone].sort()) !== JSON.stringify([...doneSet].sort())) {
        doneSet = newDone; changed = true;
      }
      if (json.phase !== phase) { phase = json.phase; changed = true; }
      if ((json.countdown || null) !== countdownTarget) { countdownTarget = json.countdown || null; changed = true; }
      if (changed) renderAll();
    } catch(e) { /* tiché selhání pollingu */ }
  }, interval);
}

function stopPolling() {
  if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
}

// ═══════════════════════════════════════════════════════
//  AUTENTIZACE (heslo v paměti, bez Firebase Auth)
// ═══════════════════════════════════════════════════════
async function login() {
  const pwd  = document.getElementById('adminPwd')?.value;
  const hint = document.getElementById('adminHint');
  if (!pwd) { if (hint) hint.textContent = '✗ Zadejte heslo'; return; }

  // Ověř heslo voláním API — action=load s pwd vrátí data + history
  try {
    const res = await fetch(APPS_SCRIPT_URL + `?action=load&pwd=${encodeURIComponent(pwd)}`);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
    // Heslo je správné (API vrátilo data) — ulož do paměti
    adminPassword = pwd;
    isAdmin = true;
    document.body.classList.add('admin-mode');
    stopPolling();
    // Aplikuj načtená data
    if (json.data && json.data.length) data = json.data;
    doneSet = new Set((json.done || []).map(Number));
    phase = json.phase || 'hidden';
    countdownTarget = json.countdown || null;
    if (json.history) {
      changeHistory.length = 0;
      changeHistory.push(...json.history);
    }
    renderAdminBar();
    renderAll();
    startPolling();
  } catch(e) {
    if (hint) {
      hint.textContent = '✗ Špatné heslo';
      setTimeout(() => { const h = document.getElementById('adminHint'); if (h) h.textContent = ''; }, 3000);
    }
    if (document.getElementById('adminPwd')) document.getElementById('adminPwd').value = '';
  }
}

function logout() {
  isAdmin = false;
  adminPassword = null;
  document.body.classList.remove('edit-mode', 'admin-mode');
  stopPolling();
  renderAdminBar();
  loadData(false).then(() => startPolling());
}

// ═══════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function parseTimeVal(str) {
  const s = str.trim().toUpperCase();
  if (s===''||s==='-'||s==='—') return null;
  if (s==='DSQ') return 'DSQ';
  if (s==='NP')  return 'NP';
  const n = parseFloat(s.replace(',','.'));
  return isNaN(n) ? null : n;
}

function bestTime(d) {
  const nums = [d.cas1, d.cas2].filter(t => typeof t === 'number');
  if (nums.length === 2) return Math.max(...nums);
  if (nums.length === 1) return nums[0];
  return null;
}

function formatZapis(val) {
  if (!val) return null;
  // Already in HH:MM or HH:MM:SS format
  if (/^\d{1,2}:\d{2}/.test(String(val))) return String(val).slice(0, 5);
  // Google Sheets date-time string: "Sat Dec 30 1899 21:37:00 GMT+0100 ..."
  const d = new Date(val);
  if (!isNaN(d.getTime())) {
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }
  return String(val);
}

function timeDisplay(val) {
  if (val===null||val===undefined) return '—';
  if (val==='DSQ') return 'DSQ';
  if (val==='NP')  return 'NP';
  return val.toFixed(2)+' s';
}

function hideOverlay() {
  const el = document.getElementById('loadingOverlay');
  if (!el) return;
  el.classList.add('hidden');
  setTimeout(() => el.remove(), 300);
}

// ═══════════════════════════════════════════════════════
//  FÁZE + ODPOČET
// ═══════════════════════════════════════════════════════
let _countdownTimer = null;

function setPhase(newPhase) {
  phase = newPhase;
  savePhase();
  renderPhaseBanner();
  renderAdminBar();
  renderResults();
  renderStartlistSection();
}

function setCountdown(isoStr) {
  countdownTarget = isoStr || null;
  saveCountdown();
  renderPhaseBanner();
}

function clearCountdown() { setCountdown(null); }

function applyCountdown() {
  const val = document.getElementById('cdtInput')?.value;
  if (!val) return;
  setCountdown(val);
}

function toggleCdtAccordion() {
  const body = document.getElementById('cdtBody');
  const icon = document.getElementById('cdtToggleIcon');
  if (!body) return;
  const isOpen = body.classList.toggle('open');
  if (icon) icon.textContent = isOpen ? '▲ skrýt' : '▼ upravit';
  if (isOpen) setTimeout(() => document.getElementById('cdtInput')?.focus(), 50);
}

function startCountdownTick() {
  if (_countdownTimer) clearInterval(_countdownTimer);
  _countdownTimer = setInterval(() => {
    const el = document.getElementById('countdownDisplay');
    if (!el) { clearInterval(_countdownTimer); return; }
    renderCountdownDisplay(el);
  }, 1000);
}

function renderCountdownDisplay(el) {
  if (!countdownTarget) { el.innerHTML = ''; return; }
  const diff = new Date(countdownTarget) - Date.now();
  if (diff <= 0) { el.innerHTML = `<div class="countdown-done">🎉 Soutěž právě začíná!</div>`; return; }
  const totalSec = Math.floor(diff / 1000);
  const d = Math.floor(totalSec / 86400);
  const h = Math.floor((totalSec % 86400) / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  const pad = n => String(n).padStart(2, '0');
  const units = d > 0
    ? [{ v:d, l:'dní' }, { v:h, l:'hodin' }, { v:m, l:'minut' }, { v:s, l:'sekund' }]
    : [{ v:h, l:'hodin' }, { v:m, l:'minut' }, { v:s, l:'sekund' }];
  el.innerHTML = `<div class="countdown-wrap">${units.map(u=>`<div class="countdown-unit"><span class="countdown-num">${pad(u.v)}</span><span class="countdown-label">${u.l}</span></div>`).join('')}</div>`;
}

function renderPhaseBanner() {
  const el  = document.getElementById('phaseBanner');
  const cdp = document.getElementById('countdownPanel');
  if (!el) return;

  if (cdp) {
    if (isAdmin) {
      cdp.style.display = '';
      const curVal    = countdownTarget ? countdownTarget.slice(0, 16) : '';
      const hasTarget = !!countdownTarget;
      cdp.innerHTML = `
        <div class="history-header" onclick="toggleCdtAccordion()" id="cdtToggle">
          <span class="history-title">⏱️ Nastavení odpočtu</span>
          <div style="display:flex;align-items:center;gap:10px">
            ${hasTarget ? `<span style="font-size:12px;color:#16a34a;font-weight:500;">✓ ${new Date(countdownTarget).toLocaleString('cs-CZ')}</span>` : ''}
            ${hasTarget ? `<button class="hi-undo" onclick="event.stopPropagation();clearCountdown()" style="font-size:11px;border-color:#fca5a5;color:var(--red);background:var(--red-soft)">✕ Zrušit</button>` : ''}
            <span class="history-toggle" id="cdtToggleIcon">▼ upravit</span>
          </div>
        </div>
        <div class="history-body" id="cdtBody">
          <div style="padding:16px;">
            <div class="countdown-admin" style="margin-top:0">
              <label for="cdtInput">Datum a čas začátku:</label>
              <input type="datetime-local" id="cdtInput" value="${curVal}" />
              <button class="countdown-admin-btn" onclick="applyCountdown()">✓ Nastavit</button>
            </div>
          </div>
        </div>`;
    } else {
      cdp.style.display = 'none';
      cdp.innerHTML = '';
    }
  }

  if (phase !== 'hidden') {
    el.innerHTML = '';
    if (_countdownTimer) { clearInterval(_countdownTimer); _countdownTimer = null; }
    return;
  }
  if (isAdmin) { el.innerHTML = ''; return; }

  el.innerHTML = `<div class="phase-banner">
    <h2>Soutěž zatím nezačala</h2>
    <p>Startovní listina bude zveřejněna před zahájením soutěže dle pořadí přihlášek na FireSportu.</p>
    <div id="countdownDisplay"></div>
  </div>`;
  const cdEl = document.getElementById('countdownDisplay');
  if (countdownTarget && cdEl) { renderCountdownDisplay(cdEl); startCountdownTick(); }
}

function renderStartlistSection() {
  const sec = document.querySelector('.startlist-section');
  if (!sec) return;
  sec.style.display = (isAdmin || phase === 'results') ? '' : 'none';
}

// ═══════════════════════════════════════════════════════
//  VÝSLEDKOVÁ TABULKA
// ═══════════════════════════════════════════════════════
function renderTimeCell(val, isBest) {
  if (val===null||val===undefined) return `<td class="tcell empty">—</td>`;
  if (val==='DSQ') return `<td class="tcell" style="text-align:right"><span class="dsq-tag">DSQ</span></td>`;
  if (val==='NP')  return `<td class="tcell" style="text-align:right"><span class="np-tag">NP</span></td>`;
  return `<td class="tcell${isBest?' best':''}">${val.toFixed(2)}&thinsp;s</td>`;
}

function renderResults() {
  const el = document.getElementById('content');
  el.innerHTML = '';
  if (!isAdmin && phase !== 'results') return;

  CATEGORIES.forEach(cat => {
    function hasTime(d) {
      const valid = v => v!==null&&v!==undefined&&v!==''&&v!==false;
      return valid(d.cas1)||valid(d.cas2);
    }
    let rows = data.filter(d => d.kategorie===cat && hasTime(d));
    if (!rows.length) return;

    rows = [...rows].sort((a,b) => {
      const ta=bestTime(a), tb=bestTime(b);
      if (ta===null&&tb===null) return 0;
      if (ta===null) return 1; if (tb===null) return -1;
      return ta-tb;
    });

    const rowsHtml = rows.map((d,i) => {
      const bt=bestTime(d);
      const rc=bt!==null?(i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':''):'';
      const rankTxt=i===0&&bt!==null?'🥇':i===1&&bt!==null?'🥈':i===2&&bt!==null?'🥉':(i+1)+'.';
      const rankCls=i===0&&bt!==null?'g':i===1&&bt!==null?'s':i===2&&bt!==null?'b':'';
      const c1n=typeof d.cas1==='number', c2n=typeof d.cas2==='number';
      const c1worst=c1n&&c2n?d.cas1>=d.cas2:c1n;
      const c2worst=c1n&&c2n?d.cas2>d.cas1:c2n;
      const bestHtml=bt!==null?`<td class="best-col">${bt.toFixed(2)}&thinsp;s</td>`:`<td class="best-col empty">—</td>`;
      return `<tr class="${rc}">
        <td style="width:40px"><span class="rank ${rankCls}">${rankTxt}</span></td>
        <td style="width:50px;text-align:center"><span class="snum">${d.start}</span></td>
        <td><div class="tname">${esc(d.team)}</div></td>
        ${renderTimeCell(d.cas1,c1worst)}${renderTimeCell(d.cas2,c2worst)}${bestHtml}
      </tr>`;
    }).join('');

    function fmtTime(val) {
      if (val===null||val===undefined) return '<span class="worst">—</span>';
      if (val==='DSQ') return '<span class="dsq-tag">DSQ</span>';
      if (val==='NP')  return '<span class="np-tag">NP</span>';
      return val.toFixed(2)+'s';
    }
    const cardsHtml = rows.map((d,i) => {
      const bt=bestTime(d);
      const rc=bt!==null?(i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':''):'';
      const rankTxt=i===0&&bt!==null?'🥇':i===1&&bt!==null?'🥈':i===2&&bt!==null?'🥉':`${i+1}.`;
      const isNum=!['🥇','🥈','🥉'].includes(rankTxt);
      const c1n=typeof d.cas1==='number', c2n=typeof d.cas2==='number';
      const c1worst=c1n&&c2n?d.cas1>=d.cas2:c1n;
      const c2worst=c1n&&c2n?d.cas2>d.cas1:c2n;
      const bestStr=bt!==null?`${bt.toFixed(2)}&thinsp;s`:null;
      return `<div class="result-card ${rc}">
        <div class="rc-rank${isNum?' num':''}">${rankTxt}</div>
        <div class="rc-body">
          <div class="rc-team">${esc(d.team)}</div>
          <div class="rc-snum">St. č. ${esc(String(d.start))}</div>
        </div>
        <div class="rc-times">
          ${bestStr?`<div class="rc-best">${bestStr}</div>`:`<div class="rc-best empty">—</div>`}
          <div class="rc-sub-times">
            <span class="${c1worst?'':'worst'}">${fmtTime(d.cas1)}</span>
            <span style="color:var(--muted)"> / </span>
            <span class="${c2worst?'':'worst'}">${fmtTime(d.cas2)}</span>
          </div>
        </div>
      </div>`;
    }).join('');

    const n=rows.length;
    const block=document.createElement('div');
    block.className='category-block';
    block.innerHTML=`
      <div class="cat-label">
        <span class="cat-name">${esc(cat)}</span>
        <span class="cat-pill">${n} ${n===1?'tým':n<5?'týmy':'týmů'}</span>
      </div>
      <table class="results-table">
        <colgroup><col style="width:50px"><col style="width:60px"><col><col style="width:155px"><col style="width:155px"><col style="width:165px"></colgroup>
        <thead><tr><th class="c">Poř.</th><th class="c">St. č.</th><th>Tým</th><th class="r">Levý terč</th><th class="r">Pravý terč</th><th class="r">Výsledný čas</th></tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
      <div class="result-cards">${cardsHtml}</div>`;
    el.appendChild(block);
  });
}

    const actionCell = isAdmin ? `<td style="text-align:right;white-space:nowrap">

  // Mobile cards

      ? `<select class="cat-select" data-field="kategorie" data-start="${d.start}" onchange="saveSelectField(this)">${CATEGORIES.map(c=>`<option value="${esc(c)}"${c===d.kategorie?' selected':''}>${esc(c)}</option>`).join('')}</select>`
      : `<span class="cbadge ${BADGE[d.kategorie]}">${esc(d.kategorie)}</span>`;

      ? `<input class="time-input" value="${timeDisplay(d.cas1).replace(' s','')}" data-field="cas1" data-start="${d.start}" onblur="saveTimeField(this)" />`

// ═══════════════════════════════════════════════════════
//  DRAG & DROP (beze změny logiky)
// ═══════════════════════════════════════════════════════
let dragSrcStart = null;
let _touchMoveHandler = null;
let _touchEndHandler  = null;

function initDragDrop() {
  if (_touchMoveHandler) { document.removeEventListener('touchmove', _touchMoveHandler, { passive:false }); _touchMoveHandler = null; }
  if (_touchEndHandler)  { document.removeEventListener('touchend',  _touchEndHandler);  _touchEndHandler  = null; }

  const tbody = document.getElementById('startlistBody');
  tbody.querySelectorAll('tr[draggable]').forEach(row => {
    row.addEventListener('dragstart', e => { dragSrcStart=parseInt(row.dataset.start); row.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
    row.addEventListener('dragend', () => { row.classList.remove('dragging'); tbody.querySelectorAll('tr').forEach(r=>r.classList.remove('drag-over')); });
    row.addEventListener('dragover', e => { e.preventDefault(); tbody.querySelectorAll('tr').forEach(r=>r.classList.remove('drag-over')); row.classList.add('drag-over'); });
    row.addEventListener('drop', e => { e.preventDefault(); const t=parseInt(row.dataset.start); if(dragSrcStart!==null&&dragSrcStart!==t) swapByPosition(dragSrcStart,t); });
  });

  const container = document.getElementById('startlistCardsContainer');
  if (!container) return;
  let touchDragEl=null, touchClone=null, touchOffsetY=0;

  container.querySelectorAll('.sl-card[draggable] .drag-handle').forEach(handle => {
    handle.addEventListener('touchstart', e => {
      const card=handle.closest('.sl-card');
      dragSrcStart=parseInt(card.dataset.start); touchDragEl=card;
      const touch=e.touches[0]; const rect=card.getBoundingClientRect();
      touchOffsetY=touch.clientY-rect.top;
      touchClone=card.cloneNode(true);
      touchClone.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:0.85;z-index:9999;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.18);border-radius:10px;`;
      document.body.appendChild(touchClone); card.classList.add('dragging'); e.preventDefault();
    }, { passive:false });
  });

  _touchMoveHandler = e => {
    if (!touchClone) return;
    const touch=e.touches[0]; touchClone.style.top=(touch.clientY-touchOffsetY)+'px';
    container.querySelectorAll('.sl-card').forEach(c=>c.classList.remove('drag-over'));
    const target=document.elementFromPoint(touch.clientX,touch.clientY)?.closest('.sl-card');
    if (target&&target!==touchDragEl) target.classList.add('drag-over');
    e.preventDefault();
  };
  document.addEventListener('touchmove', _touchMoveHandler, { passive:false });

  _touchEndHandler = e => {
    if (!touchClone) return;
    const touch=e.changedTouches[0];
    const target=document.elementFromPoint(touch.clientX,touch.clientY)?.closest('.sl-card');
    const targetStart=target?parseInt(target.dataset.start):null;
    if (touchClone) { touchClone.remove(); touchClone=null; }
    if (touchDragEl) { touchDragEl.classList.remove('dragging'); touchDragEl=null; }
    container.querySelectorAll('.sl-card').forEach(c=>c.classList.remove('drag-over'));
    if (dragSrcStart!==null&&targetStart!==null&&dragSrcStart!==targetStart) swapByPosition(dragSrcStart,targetStart);
    dragSrcStart=null;
  };
  document.addEventListener('touchend', _touchEndHandler);
}

function swapByPosition(srcStart, tgtStart) {
  const sorted=[...data].sort((a,b)=>a.start-b.start);
  const srcIdx=sorted.findIndex(d=>d.start===srcStart);
  const tgtIdx=sorted.findIndex(d=>d.start===tgtStart);
  if (srcIdx===-1||tgtIdx===-1) return;
  const moved=sorted.splice(srcIdx,1)[0];
  sorted.splice(tgtIdx,0,moved);
  sorted.forEach((d,i)=>{d.start=i+1;});
  saveData(); renderResults(); renderStartlist();
}

// ═══════════════════════════════════════════════════════
//  QUICK TIME ENTRY
// ═══════════════════════════════════════════════════════
function openQuickTime(startNum) {
  if (!isAdmin) return;
  const row=data.find(d=>d.start===startNum);
  if (!row) return;
  document.getElementById('qtpOverlay')?.remove();
  document.getElementById('qtpPopup')?.remove();

  const overlay=document.createElement('div');
  overlay.id='qtpOverlay'; overlay.className='qtp-overlay'; overlay.onclick=closeQuickTime;
  document.body.appendChild(overlay);

  const popup=document.createElement('div');
  popup.id='qtpPopup'; popup.className='quick-time-popup';
  popup.innerHTML=`
    <div class="qtp-title">ZADÁNÍ ČASU — St. č. ${esc(String(row.start))}</div>
    <div class="qtp-team">${esc(row.team)}</div>
    <div class="qtp-row"><span class="qtp-label">Levý terč</span><input class="qtp-input" id="qtpCas1" placeholder="např. 12.34" value="${row.cas1!==null&&row.cas1!==undefined?(typeof row.cas1==='number'?row.cas1.toFixed(2):row.cas1):''}" /></div>
    <div class="qtp-row"><span class="qtp-label">Pravý terč</span><input class="qtp-input" id="qtpCas2" placeholder="např. 11.85" value="${row.cas2!==null&&row.cas2!==undefined?(typeof row.cas2==='number'?row.cas2.toFixed(2):row.cas2):''}" /></div>
    <div class="qtp-btns"><button class="qtp-cancel" onclick="closeQuickTime()">Zrušit</button><button class="qtp-save" onclick="saveQuickTime(${startNum})">Uložit</button></div>`;
  popup.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%)';
  document.body.appendChild(popup);
  document.getElementById('qtpCas1').focus();
  document.getElementById('qtpCas1').onkeydown=e=>{if(e.key==='Enter') document.getElementById('qtpCas2').focus();};
  document.getElementById('qtpCas2').onkeydown=e=>{if(e.key==='Enter') saveQuickTime(startNum);};
}

function closeQuickTime() {
  document.getElementById('qtpOverlay')?.remove();
  document.getElementById('qtpPopup')?.remove();
}

function saveQuickTime(startNum) {
  const row=data.find(d=>d.start===startNum);
  if (!row) return;
  const v1=parseTimeVal(document.getElementById('qtpCas1').value);
  const v2=parseTimeVal(document.getElementById('qtpCas2').value);
  const prev={cas1:row.cas1,cas2:row.cas2,zapisCas:row.zapisCas};
  row.cas1=v1; row.cas2=v2;
  if (row.cas1===null&&row.cas2===null) {
    row.zapisCas=null;
  } else {
    const now=new Date();
    row.zapisCas=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  }
  addHistory(row,prev,v1,v2);
  closeQuickTime();
  saveTeamPatch(startNum);
  renderResults(); renderStartlist();
}

// ═══════════════════════════════════════════════════════
//  SAVE FIELD HANDLERS
// ═══════════════════════════════════════════════════════
function saveField(el) {
  const startNum=parseInt(el.dataset.start);
  const field=el.dataset.field;
  const val=el.innerText.trim();
  const row=data.find(d=>d.start===startNum);
  if (row) { row[field]=val; saveTeamFullPatch(startNum); renderResults(); }
}

function saveSelectField(el) {
  const startNum=parseInt(el.dataset.start);
  const field=el.dataset.field;
  const val=el.value;
  const row=data.find(d=>d.start===startNum);
  if (row) { row[field]=val; saveTeamFullPatch(startNum); renderResults(); renderStartlist(); }
}

function saveTimeField(el) {
  const startNum=parseInt(el.dataset.start);
  const field=el.dataset.field;
  const val=parseTimeVal(el.value);
  const row=data.find(d=>d.start===startNum);
  if (row) {
    const prev={cas1:row.cas1,cas2:row.cas2,zapisCas:row.zapisCas};
    row[field]=val;
    if (row.cas1===null&&row.cas2===null) {
      row.zapisCas=null;
    } else if (val!==null) {
      const now=new Date();
      row.zapisCas=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    }
    addHistory(row,prev,row.cas1,row.cas2);
    saveTeamPatch(startNum);
    renderResults(); renderStartlist();
  }
}

function deleteTeam(startNum) {
  if (!confirm('Opravdu odstranit tento tým?')) return;
  data=data.filter(d=>d.start!==startNum);
  doneSet.delete(startNum);
  saveData(true); saveDone();
  renderResults(); renderStartlist();
}

function addTeam() {
  const maxStart=data.length?Math.max(...data.map(d=>d.start)):0;
  data.push({start:maxStart+1,team:'Nový tým',kategorie:'Mladší děti',cas1:null,cas2:null});
  saveData(true);
  renderResults(); renderStartlist();
  setTimeout(() => {
    const mc=document.getElementById('startlistCardsContainer');
    const isMobile=mc&&window.getComputedStyle(mc).display!=='none';
    const target=isMobile?mc.lastElementChild:document.getElementById('startlistBody')?.lastElementChild;
    target?.scrollIntoView({behavior:'smooth'});
  }, 50);
}

function moveTeam(startNum,dir) {
  const sorted=[...data].sort((a,b)=>a.start-b.start);
  const idx=sorted.findIndex(d=>d.start===startNum);
  const swapIdx=idx+dir;
  if (swapIdx<0||swapIdx>=sorted.length) return;
  const tmp=sorted[idx].start;
  sorted[idx].start=sorted[swapIdx].start;
  sorted[swapIdx].start=tmp;
  saveData(); renderResults(); renderStartlist();
}

function toggleDone(startNum) {
  if (!isAdmin) return;
  doneSet.has(startNum)?doneSet.delete(startNum):doneSet.add(startNum);
  saveDone(); renderStartlist();
}

// ═══════════════════════════════════════════════════════
//  HISTORIE ZMĚN
// ═══════════════════════════════════════════════════════
function addHistory(row,prev,newCas1,newCas2) {
  const now=new Date();
  const ts=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  changeHistory.unshift({ts,team:row.team,start:row.start,prev,next:{cas1:newCas1,cas2:newCas2}});
  if (changeHistory.length>10) changeHistory.length=10;
  saveHistory(); renderHistory();
}

function renderHistory() {
  const panel=document.getElementById('historyPanel');
  const body=document.getElementById('historyBody');
  if (!panel) return;
  panel.style.display=isAdmin?'':'none';
  if (!isAdmin) return;

  const items=changeHistory.map((h,idx)=>{
    const parts=[];
    if(h.prev.cas1!==h.next.cas1) parts.push(`Levý: ${timeDisplay(h.prev.cas1)} → ${timeDisplay(h.next.cas1)}`);
    if(h.prev.cas2!==h.next.cas2) parts.push(`Pravý: ${timeDisplay(h.prev.cas2)} → ${timeDisplay(h.next.cas2)}`);
    return `<div class="history-item">
      <span class="hi-time">${h.ts}</span>
      <span class="hi-text"><strong>${esc(h.team)}</strong> (St.č.${esc(String(h.start))}): ${parts.join(', ')}</span>
      <button class="hi-undo" onclick="undoHistory(${idx})">↩ Vrátit</button>
    </div>`;
  }).join('');
  body.innerHTML=items||'<div class="history-empty">Zatím žádné změny.</div>';
}

function undoHistory(idx) {
  const h=changeHistory[idx];
  if (!h) return;
  const row=data.find(d=>d.start===h.start);
  if (!row) return;
  row.cas1=h.prev.cas1; row.cas2=h.prev.cas2; row.zapisCas=h.prev.zapisCas;
  changeHistory.splice(idx,1);
  saveTeamPatch(h.start); saveHistory(); renderResults(); renderStartlist(); renderHistory();
}

function clearHistory() {
  if (!changeHistory.length) return;
  if (!confirm('Opravdu vymazat celou historii změn?')) return;
  changeHistory.length=0; saveHistory(); renderHistory();
}

function toggleHistoryBody() {
  const body=document.getElementById('historyBody');
  const icon=document.getElementById('historyToggleIcon');
  body.classList.toggle('open');
  icon.textContent=body.classList.contains('open')?'▲ skrýt':'▼ zobrazit';
}

// ═══════════════════════════════════════════════════════
//  ADMIN BAR
// ═══════════════════════════════════════════════════════
function renderAdminBar() {
  const bar=document.getElementById('adminBar');
  if (isAdmin) {
    const editMode=document.body.classList.contains('edit-mode');
    const phaseLabels={ hidden:{cls:'phase-hidden',icon:'🔒',label:'Skryto pro návštěvníky'}, results:{cls:'phase-results',icon:'🏆',label:'Viditelné pro návštěvníky'} };
    const nextPhase={ hidden:'results', results:'hidden' };
    const ph=phaseLabels[phase]||phaseLabels.hidden;
    bar.innerHTML=`
      <span class="admin-on">🔓 Admin</span>
      <button class="admin-btn ${ph.cls}" onclick="setPhase('${nextPhase[phase]}')">${ph.icon} ${ph.label}</button>
      <button class="admin-btn ${editMode?'add':''}" onclick="toggleEditMode()">${editMode?'✏️ Editace ZAP':'✏️ Editovat data'}</button>
      ${editMode?`<button class="admin-btn add" onclick="addTeam()">＋ Přidat tým</button>`:''}
      <button class="admin-btn export" onclick="exportXLSX()">⬇ Export Excel</button>
      <button class="admin-btn logout" onclick="logout()">Odhlásit</button>
    `;
  } else {
    bar.innerHTML=`
      <input type="password" id="adminPwd" class="admin-input" placeholder="Heslo admina" autocomplete="off"
        onkeydown="if(event.key==='Enter') login()" />
      <button class="admin-btn" onclick="login()">Přihlásit</button>
      <span class="admin-hint" id="adminHint"></span>
    `;
  }
}

function toggleEditMode() {
  document.body.classList.toggle('edit-mode');
  renderAdminBar(); renderStartlist();
}

// ═══════════════════════════════════════════════════════
//  EXPORT XLSX (beze změny)
// ═══════════════════════════════════════════════════════
async function exportXLSX() {
  const XLSX = window.XLSX;
  if (!XLSX) { alert('Chyba: Knihovna pro export se nenačetla. Zkuste obnovit stránku.'); return; }
  const wb=XLSX.utils.book_new();
  const sBold={font:{bold:true,sz:11,name:'Arial'}};
  const sTitle={font:{bold:true,sz:14,name:'Arial',color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'1D6FBA'}},alignment:{horizontal:'center'}};
  const sCatHdr={font:{bold:true,sz:12,name:'Arial',color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'2D7DD2'}},alignment:{horizontal:'left'}};
  const sColHdr={font:{bold:true,sz:10,name:'Arial',color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'4A90C4'}},alignment:{horizontal:'center'},border:{bottom:{style:'thin',color:{rgb:'FFFFFF'}}}};
  const sRank1={font:{bold:true,sz:11,name:'Arial'},fill:{fgColor:{rgb:'FFF8DC'}}};
  const sRank2={font:{sz:11,name:'Arial'},fill:{fgColor:{rgb:'F0F4F8'}}};
  const sRank3={font:{sz:11,name:'Arial'},fill:{fgColor:{rgb:'FDF3EC'}}};
  const sNormal={font:{sz:11,name:'Arial'}};
  const sTime={font:{sz:11,name:'Arial'},alignment:{horizontal:'right'}};
  const sTimeB={font:{bold:true,sz:11,name:'Arial',color:{rgb:'C0392B'}},alignment:{horizontal:'right'}};
  const sCenter={font:{sz:11,name:'Arial'},alignment:{horizontal:'center'}};
  const sDone={font:{sz:11,name:'Arial',color:{rgb:'16A34A'}},fill:{fgColor:{rgb:'F0FDF4'}}};
  const sEmpty={font:{sz:11,name:'Arial',color:{rgb:'AAAAAA'}},alignment:{horizontal:'right'}};

  function cell(v,s){return{v,s,t:typeof v==='number'?'n':'s'};}
  function timeCell(val,isBest){
    if(val===null||val===undefined) return cell('—',sEmpty);
    if(val==='DSQ') return cell('DSQ',{font:{sz:11,name:'Arial',color:{rgb:'C0392B'}},alignment:{horizontal:'right'}});
    if(val==='NP')  return cell('NP', {font:{sz:11,name:'Arial',color:{rgb:'B45309'}},alignment:{horizontal:'right'}});
    return cell(parseFloat(val.toFixed(2)),isBest?sTimeB:sTime);
  }

  // List 1: Výsledky
  const wsData=[],merges1=[];let r1=0;
  wsData.push([cell('DĚTSKÉ ZÁVODY SDH ČASTOHOSTICE — VÝSLEDKY',sTitle),cell('',sTitle),cell('',sTitle),cell('',sTitle),cell('',sTitle),cell('',sTitle)]);
  merges1.push({s:{r:r1,c:0},e:{r:r1,c:5}});r1++;
  wsData.push([cell('',sNormal)]);r1++;
  CATEGORIES.forEach(cat=>{
    let catRows=data.filter(d=>d.kategorie===cat);
    if(!catRows.length) return;
    catRows=[...catRows].sort((a,b)=>{const ta=bestTime(a),tb=bestTime(b);if(ta===null&&tb===null)return 0;if(ta===null)return 1;if(tb===null)return -1;return ta-tb;});
    wsData.push([cell(cat,sCatHdr),cell('',sCatHdr),cell('',sCatHdr),cell('',sCatHdr),cell('',sCatHdr),cell('',sCatHdr)]);
    merges1.push({s:{r:r1,c:0},e:{r:r1,c:5}});r1++;
    wsData.push([cell('Pořadí',sColHdr),cell('St. č.',sColHdr),cell('Tým',sColHdr),cell('Levý terč (s)',sColHdr),cell('Pravý terč (s)',sColHdr),cell('Výsledný čas (s)',sColHdr)]);r1++;
    catRows.forEach((d,i)=>{
      const bt=bestTime(d);
      const rowStyle=i===0?sRank1:i===1?sRank2:i===2?sRank3:sNormal;
      const rankTxt=i===0&&bt!==null?'🥇':i===1&&bt!==null?'🥈':i===2&&bt!==null?'🥉':`${i+1}.`;
      const c1n=typeof d.cas1==='number',c2n=typeof d.cas2==='number';
      const c1worst=c1n&&c2n?d.cas1>=d.cas2:c1n;
      const c2worst=c1n&&c2n?d.cas2>d.cas1:c2n;
      const bestCell=bt!==null?cell(parseFloat(bt.toFixed(2)),{font:{bold:true,sz:12,name:'Arial',color:{rgb:'C0392B'}},alignment:{horizontal:'right'}}):cell('—',sEmpty);
      wsData.push([cell(rankTxt,{...rowStyle,alignment:{horizontal:'center'}}),cell(d.start,{...rowStyle,alignment:{horizontal:'center'}}),cell(d.team,rowStyle),timeCell(d.cas1,c1worst),timeCell(d.cas2,c2worst),bestCell]);r1++;
    });
    wsData.push([cell('',sNormal)]);r1++;
  });
  const ws1=XLSX.utils.aoa_to_sheet(wsData.map(row=>row.map(c=>c.v)));
  const range1=XLSX.utils.decode_range(ws1['!ref']);
  for(let R=range1.s.r;R<=range1.e.r;R++){for(let C=range1.s.c;C<=range1.e.c;C++){const addr=XLSX.utils.encode_cell({r:R,c:C});if(!ws1[addr])ws1[addr]={v:'',t:'s'};if(wsData[R]&&wsData[R][C])ws1[addr].s=wsData[R][C].s;if(wsData[R]&&wsData[R][C]&&typeof wsData[R][C].v==='number')ws1[addr].t='n';}}
  ws1['!merges']=merges1;ws1['!cols']=[{wch:8},{wch:7},{wch:28},{wch:14},{wch:14},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws1,'Výsledky');

  // List 2: Startovní listina
  const wsData2=[],merges2=[];let r2=0;
  wsData2.push([cell('STARTOVNÍ LISTINA — SDH ČASTOHOSTICE',sTitle),cell('',sTitle),cell('',sTitle),cell('',sTitle),cell('',sTitle),cell('',sTitle)]);
  merges2.push({s:{r:r2,c:0},e:{r:r2,c:5}});r2++;
  wsData2.push([cell('',sNormal)]);r2++;
  wsData2.push([cell('St. č.',sColHdr),cell('Tým',sColHdr),cell('Kategorie',sColHdr),cell('Levý terč (s)',sColHdr),cell('Pravý terč (s)',sColHdr),cell('Stav',sColHdr)]);r2++;
  const sorted2=[...data].sort((a,b)=>a.start-b.start);
  sorted2.forEach(d=>{
    const isDone=doneSet.has(d.start);
    const stavCell=isDone?cell('✓ Odběhnuto',sDone):cell('',sNormal);
    wsData2.push([cell(d.start,{...sCenter}),cell(d.team,isDone?{font:{sz:11,name:'Arial',color:{rgb:'888888'}}}:sNormal),cell(d.kategorie,sNormal),timeCell(d.cas1,false),timeCell(d.cas2,false),stavCell]);r2++;
  });
  const ws2=XLSX.utils.aoa_to_sheet(wsData2.map(row=>row.map(c=>c.v)));
  const range2=XLSX.utils.decode_range(ws2['!ref']);
  for(let R=range2.s.r;R<=range2.e.r;R++){for(let C=range2.s.c;C<=range2.e.c;C++){const addr=XLSX.utils.encode_cell({r:R,c:C});if(!ws2[addr])ws2[addr]={v:'',t:'s'};if(wsData2[R]&&wsData2[R][C])ws2[addr].s=wsData2[R][C].s;if(wsData2[R]&&wsData2[R][C]&&typeof wsData2[R][C].v==='number')ws2[addr].t='n';}}
  ws2['!merges']=merges2;ws2['!cols']=[{wch:7},{wch:28},{wch:16},{wch:14},{wch:14},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws2,'Startovní listina');
  XLSX.writeFile(wb,'vysledky-castohostice.xlsx');
}
